<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drift — Light Breeze</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #e8f4f8;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  #info {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(0,0,0,0.4);
    font-size: 13px;
    letter-spacing: 0.3px;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  #wind-dir {
    position: fixed;
    top: 24px;
    right: 24px;
    color: rgba(0,0,0,0.3);
    font-size: 12px;
    letter-spacing: 0.2px;
    text-align: right;
    pointer-events: none;
    user-select: none;
    line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">wind carries these particles across the city</div>
<div id="wind-dir">loading wind...</div>

<script>
// ─── Config ───────────────────────────────────────────────────────
const CONFIG = {
  particleCount: 100,
  trailLength: 60,
  warmupSteps: 200,
  windScale: 1.8,
  noiseStrength: 0.6,
  noiseSpeed: 0.0004,

  // Styles — Light Breeze palette
  palette: {
    bg: '#e8f4f8',
    layer: '#d4ecf0',
    accent1: '81,212,250',   // soft blue - primary
    accent2: '206,147,216',   // soft lavender - secondary
    accent3: '244,143,177',   // soft pink - accent
    accent4: '255,241,118',   // pale yellow - highlight
  },

  // Open-Meteo API (San Francisco)
  apiUrl: 'https://api.open-meteo.com/v1/forecast?latitude=37.77&longitude=-122.42&current_weather=true',

  // Default fallback wind (typical SF)
  fallback: { winddirection: 180, windspeed: 15 },
};

// ─── Canvas Setup ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Wind State ───────────────────────────────────────────────────
let wind = { dir: CONFIG.fallback.winddirection, speed: CONFIG.fallback.windspeed };
let vx = 0, vy = 0;

// Open-Meteo: winddirection (0=N, 90=E), windspeed (km/h)
// Convert: vx = -sin(dir*PI/180) * speed * scale
//           vy =  cos(dir*PI/180) * speed * scale
function updateWindVector() {
  const rad = wind.dir * Math.PI / 180;
  vx = -Math.sin(rad) * wind.speed * CONFIG.windScale * 0.1;
  vy =  Math.cos(rad) * wind.speed * CONFIG.windScale * 0.1;
}

// ─── Particles ────────────────────────────────────────────────────
class Particle {
  constructor() {
    this.reset(true);
  }

  reset(randomize) {
    if (randomize) {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
    } else {
      // spawn from edges
      if (Math.random() < 0.5) {
        this.x = Math.random() * W;
        this.y = Math.random() < 0.5 ? -10 : H + 10;
      } else {
        this.x = Math.random() < 0.5 ? -10 : W + 10;
        this.y = Math.random() * H;
      }
    }
    this.trail = [];
    // pick a palette color
    const p = CONFIG.palette;
    const colors = [p.accent1, p.accent2, p.accent3, p.accent4];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.radius = 1 + Math.random() * 2; // 1-3px
    this.baseVx = 0;
    this.baseVy = 0;
    this.noiseOff = Math.random() * 10000;
    this.phase = Math.random() * Math.PI * 2;
    this.amplitude = 0.1 + Math.random() * 0.3;
  }

  update() {
    // wind vector + noise perturbation
    const noiseAngle = (Math.sin(this.noiseOff) + Math.cos(this.noiseOff * 0.7)) * 0.5;
    const nvx = Math.cos(this.noiseOff * 1.3) * CONFIG.noiseStrength * 0.04;
    const nvy = Math.sin(this.noiseOff * 0.9) * CONFIG.noiseStrength * 0.04;

    // gentle spring-like oscillation
    const osc = this.amplitude * Math.sin(Date.now() * 0.001 * 0.5 + this.phase);
    const oscVx = osc * 0.02;
    const oscVy = osc * 0.015;

    this.x += vx + nvx + oscVx;
    this.y += vy + nvy + oscVy;
    this.noiseOff += CONFIG.noiseSpeed;

    // store trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > CONFIG.trailLength) {
      this.trail.shift();
    }

    // wrap around edges
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;
  }

  draw(ctx) {
    if (this.trail.length < 2) return;

    ctx.save();
    ctx.lineCap = 'round';

    // draw trail
    const len = this.trail.length;
    for (let i = 1; i < len; i++) {
      const t = i / len;
      const alpha = t * 0.45; // 0 to 0.45
      const width = t * this.radius;

      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = `rgba(${this.color},${alpha})`;
      ctx.lineWidth = Math.max(0.5, width);
      ctx.stroke();
    }

    // draw particle head (slightly brighter)
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},0.6)`;
    ctx.fill();

    ctx.restore();
  }
}

// ─── BG Gradient ──────────────────────────────────────────────────
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, CONFIG.palette.bg);
  grad.addColorStop(1, CONFIG.palette.layer);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Wind Direction Indicator ──────────────────────────────────────────
function drawWindIndicator() {
  const windEl = document.getElementById('wind-dir');
  const dirNames = ['N','NE','E','SE','S','SW','W','NW'];
  const idx = Math.round((wind.dir % 360) / 45) % 8;
  const label = `${Math.round(wind.speed)} km/h ${dirNames[idx]}`;
  windEl.textContent = label;
}

// ─── Init ─────────────────────────────────────────────────────────
const particles = [];
for (let i = 0; i < CONFIG.particleCount; i++) {
  particles.push(new Particle());
}

updateWindVector();

// ─── Warmup ────────────────────────────────────────────────────────
for (let s = 0; s < CONFIG.warmupSteps; s++) {
  for (const p of particles) {
    p.update();
  }
}

// ─── Render Loop ──────────────────────────────────────────────────
function loop() {
  drawBackground();

  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  drawWindIndicator();

  requestAnimationFrame(loop);
}

// ─── API Fetch ────────────────────────────────────────────────────
async function fetchWind() {
  try {
    const res = await fetch(CONFIG.apiUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.current_weather) {
      wind.dir = data.current_weather.winddirection;
      wind.speed = data.current_weather.windspeed;
      updateWindVector();
    }
  } catch (e) {
    console.warn('Wind API failed, using fallback:', e.message);
    // fallback already set
  }
}

fetchWind().then(() => {
  loop();
});
</script>
</body>
</html>
